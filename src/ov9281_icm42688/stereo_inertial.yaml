%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters (Stereo-Inertial)
#--------------------------------------------------------------------------------------------
File.version: "1.0"
Camera.type: "PinHole"

# -------- cam0 -> ORB Camera1 (Left) --------
Camera1.fx: 505.8448
Camera1.fy: 505.0037
Camera1.cx: 317.1796
Camera1.cy: 185.4671
Camera1.k1: 0.13750145239551714
Camera1.k2: -0.26317831899591726
Camera1.p1: -0.0019228714799031084
Camera1.p2: 0.0026778966391859493

# -------- cam1 -> ORB Camera2 (Right) --------
Camera2.fx: 509.5787
Camera2.fy: 509.9932
Camera2.cx: 305.4101
Camera2.cy: 181.1585
Camera2.k1: 0.1616968515531264
Camera2.k2: -0.26842098291706223
Camera2.p1: -0.007790897916713335
Camera2.p2: -0.0030861603115301265

# Image size
Camera.width: 640
Camera.height: 400

Camera.fps: 30

Camera.RGB: 0

Stereo.ThDepth: 30.0
Camera.b: 0.0572
Camera.bf: 57.9

# Stereo transform: T_c1_c2  (Left cam0 -> Right cam1)
Stereo.T_c1_c2: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [ 0.9997079431377165, 0.023406855253517062, -0.006012283634231234, 0.05597092565468752,
           -0.023368600384955047, 0.9997067110541245, 0.006356130064333571, -0.010350590797386323,
           0.006159297314290225, -0.006213775059281357, 0.9999617252955775, 0.005908422577458948,
           0.0, 0.0, 0.0, 1.0 ]


#--------------------------------------------------------------------------------------------
# IMU-Body to Camera extrinsic
# ORB-SLAM3 expects IMU.T_b_c1 = (Camera1 -> Body/IMU)  (see official EuRoC.yaml comment)
# Here: inverse(cam0 T_cam_imu)
#--------------------------------------------------------------------------------------------
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [ -0.9994447412571416, -0.03269642652471439, 0.006415049957719345, -0.022732449972,
           0.03273112164916856, -0.9994497129494809, 0.005380052117626667, 0.012313017903,
           0.006235611360036061, 0.005587036577202924, 0.9999649504723914, -0.022834802559,
           0.0, 0.0, 0.0, 1.0 ]

IMU.NoiseGyro: 1.7e-04
IMU.NoiseAcc:  2.0e-03
IMU.GyroWalk:  1.9e-05
IMU.AccWalk:   3.0e-03
IMU.Frequency: 200.0

ORBextractor.nFeatures: 1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0
